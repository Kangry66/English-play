        function App() {
            const [db, setDb] = useState(initialDB);
            const [recordings, setRecordings] = useState({});
            const [recordingState, setRecordingState] = useState(null);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);

            const [currentTab, setCurrentTab] = useState('phonetics');
            const [toast, setToast] = useState(null);
            const [isDark, setIsDark] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const appRef = useRef(null);

            // Icon effect is handled in the Icon component directly

            const toggleFullscreen = () => {
                if (!isFullscreen) {
                    if (appRef.current.requestFullscreen) appRef.current.requestFullscreen().catch(() => setIsFullscreen(true));
                    else setIsFullscreen(true);
                } else {
                    if (document.exitFullscreen) document.exitFullscreen().catch(() => setIsFullscreen(false));
                    else setIsFullscreen(false);
                }
            };

            const startRecording = async (id) => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = recorder;
                    audioChunksRef.current = [];
                    recorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
                    recorder.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        setRecordings(prev => ({ ...prev, [id]: audioUrl }));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    recorder.start();
                    setRecordingState(id);
                } catch (err) { showToast("Necesitas permitir acceso al micrófono."); }
            };

            const stopRecording = () => { if (mediaRecorderRef.current) { mediaRecorderRef.current.stop(); setRecordingState(null); } };
            const playRecording = (id) => { if (recordings[id]) { new Audio(recordings[id]).play(); } };

            const playAudio = (text, requestedLang = 'en-US') => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const isSpanish = requestedLang === 'es-MX' || requestedLang === 'es-ES';
                    let targetLang = isSpanish ? 'es-MX' : 'en-US';
                    utterance.lang = targetLang;
                    utterance.rate = 0.85;

                    const setVoiceAndSpeak = () => {
                        const voices = window.speechSynthesis.getVoices();
                        let voice = null;
                        if (isSpanish) {
                            voice = voices.find(v => v.lang === 'es-MX' && v.name.includes('Google')) || voices.find(v => v.lang === 'es-MX') || voices.find(v => v.lang.startsWith('es'));
                        } else {
                            voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
                        }
                        if (voice) utterance.voice = voice;
                        window.speechSynthesis.speak(utterance);
                    };

                    if (window.speechSynthesis.getVoices().length === 0) {
                        window.speechSynthesis.onvoiceschanged = setVoiceAndSpeak;
                    } else {
                        setVoiceAndSpeak();
                    }
                } else {
                    showToast("Tu navegador no soporta lectura de voz.");
                }
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const theme = {
                bgApp: isDark ? 'bg-black text-slate-100' : 'bg-slate-50 text-slate-800',
                navBg: isDark ? 'bg-zinc-950 border-zinc-800' : 'bg-white border-slate-200',
                cardBg: isDark ? 'bg-zinc-900 border-zinc-800 shadow-xl' : 'bg-white border-slate-200 shadow-sm',
                cardHover: isDark ? 'hover:bg-zinc-800 hover:border-indigo-500/50' : 'hover:bg-slate-50 hover:border-slate-300',
                textMuted: isDark ? 'text-zinc-500' : 'text-slate-500',
                textBold: isDark ? 'text-white' : 'text-slate-800',
                inputBg: isDark ? 'bg-zinc-950 border-zinc-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-800',
                btnPrimary: 'bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/20 active:scale-95 transition-all',
                btnSecondary: isDark ? 'bg-zinc-800 hover:bg-zinc-700 text-zinc-100 border border-zinc-700 active:scale-95 transition-all' : 'bg-slate-200 hover:bg-slate-300 text-slate-800 active:scale-95 transition-all',
                btnAccent: 'bg-amber-600 hover:bg-amber-500 text-white shadow-lg shadow-amber-500/20 active:scale-95 transition-all',
                btnDanger: isDark ? 'bg-rose-900/30 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-900/50' : 'bg-rose-100 hover:bg-rose-600 text-rose-600 hover:text-white active:scale-95 transition-all'
            };

            return (
                <div ref={appRef} className={`min-h-screen font-sans transition-colors duration-300 ${isFullscreen ? 'fixed inset-0 z-[100] w-screen h-screen overflow-y-auto bg-black' : 'pb-20 md:pb-0 md:pl-64'} ${theme.bgApp}`}>
                    {toast && (
                        <div className="fixed top-4 right-4 z-[110] bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-2 animate-bounce border border-indigo-400">
                            <Icon name="check-circle-2" size={20} /> {toast}
                        </div>
                    )}

                    <nav className={`${isFullscreen ? 'hidden' : 'fixed bottom-0 left-0 w-full border-t md:w-64 md:h-screen md:border-t-0 md:border-r flex md:flex-col overflow-x-auto whitespace-nowrap p-2 md:p-4 z-40 transition-colors duration-300'} ${theme.navBg}`}>
                        <div className="hidden md:block mb-8 mt-4 text-center">

                    <main className={`p-4 transition-all duration-300 ${isFullscreen ? 'w-full max-w-5xl mx-auto py-10' : 'md:p-8 max-w-5xl mx-auto'}`}>
                        {currentTab === 'phonetics' && <PhoneticsModule playAudio={playAudio} theme={theme} isDark={isDark} isFullscreen={isFullscreen} toggleFullscreen={toggleFullscreen} recordings={recordings} playRecording={playRecording} recordingState={recordingState} startRecording={startRecording} stopRecording={stopRecording} />}
                        {currentTab === 'pronunciation' && <PronunciationGym db={db} playAudio={playAudio} theme={theme} isFullscreen={isFullscreen} toggleFullscreen={toggleFullscreen} />}
                        {currentTab === 'visual' && <VisualGame db={db} playAudio={playAudio} theme={theme} isFullscreen={isFullscreen} toggleFullscreen={toggleFullscreen} />}

        function NavButton({ icon, label, active, onClick, isHighlight, isDark, theme }) {
            const activeClass = isDark ? 'bg-indigo-900/40 text-indigo-400 border border-indigo-500/30 shadow-lg' : 'bg-indigo-100 text-indigo-700';
            const inactiveClass = isDark ? 'text-zinc-500 hover:text-zinc-200 hover:bg-zinc-900' : 'text-slate-500 hover:bg-slate-100';
            const highlightClass = isDark ? (active ? 'bg-amber-900/40 text-amber-400 border border-amber-500/30' : 'text-amber-500 hover:bg-zinc-900') : (active ? 'bg-amber-100 text-amber-800' : 'bg-amber-50 text-amber-700');
            return (

        // --- MÓDULO: LABORATORIO DE SONIDOS ---
        function PhoneticsModule({ playAudio, theme, isFullscreen, toggleFullscreen, recordings, playRecording, recordingState, startRecording, stopRecording }) {
            const SoundCard = ({ item, idPrefix }) => {

                const cardId = `${idPrefix}-${label}`;
                const hasRecording = recordings[cardId];

                    <div className={`p-6 rounded-3xl border transition-all duration-300 relative group flex flex-col items-center shadow-xl ${theme.cardBg} ${theme.cardHover}`}>
                        <div className="absolute top-4 left-4 flex gap-2 opacity-30 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => playAudio(item.sound, 'en-US')} title="Referencia Nativa" className="p-2 bg-zinc-950/50 rounded-lg text-indigo-400 hover:text-white hover:bg-indigo-600 transition-all shadow-inner">
                                <Icon name="headphones" size={14} />
                            </button>
                        </div>
                        <span className={`text-5xl font-black block text-center mb-1 mt-2 text-white`}>{label}</span>

                        <p className={`text-[11px] text-center mb-6 h-12 leading-tight font-medium overflow-hidden ${theme.textMuted}`}>{item.desc}</p>

                        <div className="grid grid-cols-2 gap-3 w-full mb-4">

                                <Icon name={hasRecording ? "user" : "volume-2"} size={16} />
                                {hasRecording ? "MI VOZ" : "INGLÉS"}
                            </button>
                            <button onClick={() => playAudio(label || item.letter || item.L, 'es-MX')} className={`p-4 rounded-xl font-black text-[10px] uppercase tracking-widest flex flex-col items-center justify-center gap-1 transition-all active:scale-95 ${theme.btnSecondary}`}>
                                <Icon name="globe" size={16} />
                                ESPAÑOL
                            </button>
                        </div>

                        <div className="w-full">
                            <button

                                <Icon name={recordingState === cardId ? "square" : "mic"} size={12} /> {recordingState === cardId ? 'STOP' : 'GRABAR NUEVA'}
                            </button>

            return (
                <div className="animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-start mb-12 gap-6">

                            <h2 className={`text-4xl font-black flex items-center gap-3 text-white`}><Icon className="text-rose-500" name="mic" /> Centro de Sonidos</h2>
                            <p className={`mt-2 ${theme.textMuted}`}>Entrena tu oído con la pronunciación nativa y grabaciones propias.</p>
                        </div>
                        <div className="flex items-center gap-4 w-full md:w-auto">
                            <div className="flex-1 p-4 bg-indigo-900/20 border border-indigo-500/30 rounded-2xl text-[10px] leading-relaxed italic text-indigo-300 shadow-2xl relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-1 opacity-20"><Icon name="info" size={40} /></div>
                                <span className="font-bold text-indigo-400 block mb-1">PRO TIP:</span>
                                {phoneticData.rules.vowels}
                            </div>
                            <button onClick={toggleFullscreen} className={`p-4 rounded-2xl flex items-center justify-center h-full aspect-square ${theme.cardBg} ${theme.textMuted} hover:text-indigo-400 border border-zinc-800 transition-all hover:scale-105 active:scale-95`}>
                                {isFullscreen ? <Icon name="minimize" size={24} /> : <Icon name="maximize" size={24} />}
                            </button>
                        </div>
                    </div>

                    <div className="space-y-20">
                        <section>
                            <h3 className="text-xl font-black text-amber-500 border-l-4 border-amber-500 pl-4 mb-8 uppercase tracking-widest flex justify-between items-center">
                                Abecedario
                                <span className="text-[10px] text-zinc-600 font-normal">A-Z ALPHA</span>
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                                {phoneticData.alphabet.map(item => <SoundCard key={item.L} item={item} idPrefix="abc" />)}
                            </div>
                        </section>

                        <section className="relative">
                            <h3 className="text-xl font-black text-rose-500 border-l-4 border-rose-500 pl-4 mb-8 uppercase tracking-widest flex justify-between items-center">
                                Vocales Cortas (Short)
                                <span className="text-[10px] text-zinc-600 font-normal">CVC RULE</span>
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                                {phoneticData.shortVowels.map(item => <SoundCard key={item.letter} item={item} idPrefix="short" />)}
                            </div>
                        </section>

                        <section>
                            <h3 className="text-xl font-black text-emerald-500 border-l-4 border-emerald-500 pl-4 mb-8 uppercase tracking-widest flex justify-between items-center">
                                Vocales Largas (Long)
                                <span className="text-[10px] text-zinc-600 font-normal">SILENT E RULE</span>
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                                {phoneticData.longVowels.map(item => <SoundCard key={item.letter} item={item} idPrefix="long" />)}
                            </div>
                        </section>

                        <section>
                            <h3 className="text-xl font-black text-violet-500 border-l-4 border-violet-500 pl-4 mb-8 uppercase tracking-widest flex justify-between items-center">
                                Retos Fonéticos
                                <span className="text-[10px] text-zinc-600 font-normal">TH & DIGRAPHS</span>
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                                {phoneticData.trickySounds.map((item, i) => <SoundCard key={item.L || i} item={item} idPrefix="tricky" />)}
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        // --- OTROS MÓDULOS ---
        function PronunciationGym({ db, playAudio, theme, isFullscreen, toggleFullscreen }) {
            const [idx, setIdx] = useState(0);
            const word = db[idx];

            return (
                <div className="flex flex-col items-center animate-fade-in max-w-lg mx-auto">
                    <div className="flex justify-between items-center w-full mb-8">
                        <h2 className={`text-3xl font-black text-white`}>Pronunciación</h2>
                        <button onClick={toggleFullscreen} className={`p-3 rounded-2xl ${theme.cardBg} ${theme.textMuted}`}>
                            {isFullscreen ? <Icon name="minimize" size={20} /> : <Icon name="maximize" size={20} />}
                        </button>
                    </div>
                    <div className={`w-full rounded-[2.5rem] p-12 border-2 transition-all shadow-2xl ${theme.cardBg} border-indigo-500/10 text-center relative overflow-hidden`}>
                        <div className="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                        <div className="text-9xl mb-8 transform hover:scale-110 transition-transform duration-500 drop-shadow-[0_20px_20px_rgba(79,70,229,0.3)]">{word.emoji}</div>
                        <h3 className={`text-6xl font-black mb-3 text-white`}>{word.en}</h3>
                        <p className="text-indigo-400 font-mono text-3xl mb-8">/{word.pron}/</p>
                        <div className="h-px bg-zinc-800 w-full mb-8"></div>
                        <p className="text-3xl font-medium text-zinc-400">{word.es}</p>
                        <p className="text-sm font-medium text-zinc-600 uppercase mt-4">{word.category}</p>

                        <div className="flex justify-center gap-4 mt-6">
                            <button onClick={() => playAudio(word.en)} className="px-4 py-2 bg-indigo-600/20 text-indigo-400 rounded-xl font-bold flex items-center gap-2 hover:bg-indigo-600 hover:text-white transition-colors">
                                <Icon name="volume-2" size={16} /> Inglés
                            </button>
                            <button onClick={() => playAudio(word.es, 'es-MX')} className="px-4 py-2 bg-emerald-600/20 text-emerald-400 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-600 hover:text-white transition-colors">
                                <Icon name="volume-2" size={16} /> Español
                            </button>
                        </div>
                    </div>
                    <div className="flex items-center gap-8 mt-12">
                        <button onClick={() => setIdx((idx - 1 + db.length) % db.length)} className={`p-5 rounded-full transition-all ${theme.btnSecondary}`}><Icon name="chevron-left" size={28} /></button>
                        <button onClick={() => playAudio(word.en)} className={`p-8 rounded-full shadow-2xl transform transition-all hover:scale-110 active:scale-95 ${theme.btnPrimary}`}><Icon name="volume-2" size={48} /></button>
                        <button onClick={() => setIdx((idx + 1) % db.length)} className={`p-5 rounded-full transition-all ${theme.btnSecondary}`}><Icon name="chevron-right" size={28} /></button>
                    </div>
                </div>
            );
        }

        function VisualGame({ db, playAudio, theme, isFullscreen, toggleFullscreen }) {
            const [index, setIndex] = useState(0);
            const [target, setTarget] = useState(null);
            const [options, setOptions] = useState([]);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [locked, setLocked] = useState(false);

            const loadChallenge = (idx) => {
                setFeedback(null);
                setLocked(false);
                const t = db[idx % db.length];
                const opts = [t, ...db.filter(x => x.id !== t.id).sort(() => 0.5 - Math.random()).slice(0, 3)].sort(() => 0.5 - Math.random());
                setTarget(t);
                setOptions(opts);
                setTimeout(() => playAudio(t.es, 'es-MX'), 500);
            };

            const goNext = () => setIndex(prev => prev + 1);
            const goPrev = () => setIndex(prev => Math.max(0, prev - 1));

            useEffect(() => { loadChallenge(index); }, [index]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') goNext();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            if (!target) return null;

            return (
                <div className="max-w-md mx-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className={`text-3xl font-black text-white`}>Visual Study 👁️</h2>
                        <div className="flex items-center gap-4">
                            <span className="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 px-5 py-2 rounded-full font-black text-sm shadow-xl">SCORE: {score}</span>
                            <button onClick={toggleFullscreen} className={`p-3 rounded-2xl transition-all ${theme.cardBg} ${theme.textMuted}`}>{isFullscreen ? <Icon name="minimize" /> : <Icon name="maximize" />}</button>
                        </div>
                    </div>

                    <div className={`p-12 rounded-[2.5rem] border-2 text-center mb-6 shadow-2xl transition-all duration-500 relative cursor-pointer group ${feedback === 'correct' ? 'border-emerald-500 bg-emerald-900/30' : feedback === 'incorrect' ? 'border-rose-500 bg-rose-900/30' : 'border-zinc-800 ' + theme.cardBg}`} onClick={() => playAudio(target.es, 'es-MX')}>
                        <Icon name="volume-2" className="absolute top-4 right-4 text-zinc-600 group-hover:text-emerald-400 transition-colors" />
                        <div className="text-9xl mb-8 animate-bounce-slow drop-shadow-[0_20px_30px_rgba(255,255,255,0.1)]">{target.emoji}</div>
                        <p className="text-3xl font-black tracking-widest text-emerald-400 uppercase">{target.es}</p>
                        {feedback === 'correct' && <p className="mt-4 text-2xl font-black text-emerald-400 animate-pop-in tracking-tighter">Correct!</p>}
                        {feedback === 'incorrect' && <p className="mt-4 text-2xl font-black text-rose-400 animate-pop-in tracking-tighter">Incorrect</p>}
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-8">
                        {options.map(opt => (
                            <button key={opt.id} disabled={locked} onClick={() => {
                                playAudio(opt.en, 'en-US');
                                if (opt.id === target.id) {
                                    setScore(s => s + 1);
                                    setFeedback('correct');
                                    setLocked(true);
                                    setTimeout(() => playAudio("Correct!", 'en-US'), 600);
                                } else {
                                    setFeedback('incorrect');
                                    setTimeout(() => playAudio("Incorrect", 'en-US'), 600);
                                    setTimeout(() => setFeedback(null), 1500);
                                }
                            }} className={`p-6 rounded-3xl border-2 font-black text-xl transition-all duration-300 transform active:scale-95 disabled:opacity-60 ${feedback === 'correct' && opt.id === target.id ? 'border-emerald-500 bg-emerald-600 text-white scale-105' : theme.cardBg + ' ' + theme.cardHover + ' border-zinc-800 text-white'} flex justify-between items-center`}>
                                {opt.en} <Icon name="volume-2" size={16} className="text-indigo-500 opacity-50" />
                            </button>
                        ))}
                    </div>

                    <div className="flex gap-4">
                        <button onClick={goPrev} className={`flex-1 py-5 rounded-3xl font-black text-xl transition-all ${theme.cardBg} border-2 border-zinc-800 text-white flex items-center justify-center gap-3 hover:bg-zinc-800`}>
                            <Icon name="arrow-left" /> Previous
                        </button>
                        <button onClick={goNext} className={`flex-[2] py-5 rounded-3xl font-black text-xl transition-all ${theme.btnPrimary} flex items-center justify-center gap-3 shadow-xl`}>
                            Next <span className="text-xs opacity-50 font-normal">(Press Enter)</span> <Icon name="arrow-right" />
                        </button>
                    </div>
                </div>
            );
        }

        function LegoGame({ db, playAudio, theme, isDark, isFullscreen, toggleFullscreen }) {
            const [selected, setSelected] = useState([]);
            const [pool, setPool] = useState([]);
            const [mission, setMission] = useState('');
            const [missionLang, setMissionLang] = useState('en');
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [isCorrect, setIsCorrect] = useState(false);

            var sentences = [
                { en: ["I", "want", "a", "banana"], es: ["Yo", "quiero", "una", "banana"] },
                { en: ["You", "like", "the", "apples"], es: ["A", "ti", "te", "gustan", "las", "manzanas"] },
                { en: ["He", "needs", "some", "water"], es: ["Él", "necesita", "un", "poco", "de", "agua"] },
                { en: ["They", "eat", "a", "lot", "of", "bread"], es: ["Ellos", "comen", "mucho", "pan"] },
                { en: ["We", "drink", "cold", "water"], es: ["Nosotros", "bebemos", "agua", "fría"] },
                { en: ["She", "likes", "the", "red", "apple"], es: ["A", "ella", "le", "gusta", "la", "manzana", "roja"] },
                { en: ["I", "see", "a", "big", "red", "dog"], es: ["Yo", "veo", "un", "perro", "rojo", "y", "grande"] },
                { en: ["You", "need", "good", "food"], es: ["Tú", "necesitas", "buena", "comida"] },
                { en: ["We", "go", "to", "the", "white", "house"], es: ["Nosotros", "vamos", "a", "la", "casa", "blanca"] },
                { en: ["He", "is", "very", "happy", "today"], es: ["Él", "está", "muy", "feliz", "hoy"] },
                { en: ["She", "is", "sad", "at", "night"], es: ["Ella", "está", "triste", "en", "la", "noche"] },
                { en: ["I", "love", "my", "mother"], es: ["Yo", "amo", "a", "mi", "madre"] },
                { en: ["My", "father", "wants", "a", "blue", "car"], es: ["Mi", "padre", "quiere", "un", "coche", "azul"] },
                { en: ["They", "play", "with", "the", "dog"], es: ["Ellos", "juegan", "con", "el", "perro"] }
            ];

            var distractorsEn = ["sleep", "run", "big", "small", "time", "night", "good", "bad", "walk", "come", "the", "a", "my"];
            var distractorsEs = ["dormir", "correr", "grande", "pequeño", "hora", "noche", "bueno", "malo", "caminar", "venir", "el", "la", "un", "una", "los", "las"];

            var pickRandom = function (arr) { return arr[Math.floor(Math.random() * arr.length)]; };
            var shuffle = function (arr) { return arr.slice().sort(function () { return 0.5 - Math.random(); }); };

            var generateSentence = function () {
                var s = pickRandom(sentences);
                var isEnToEs = Math.random() > 0.5;

                var missionWords, answerWords, extraPool;
                if (isEnToEs) {
                    missionWords = s.en;
                    answerWords = s.es.slice();
                    extraPool = distractorsEs;
                    setMissionLang('en');
                } else {
                    missionWords = s.es;
                    answerWords = s.en.slice();
                    extraPool = distractorsEn;
                    setMissionLang('es');
                }

                setMission(missionWords.join(' '));
                var extras = shuffle(extraPool.filter(function (d) { return answerWords.indexOf(d) === -1; })).slice(0, 4);
                var allCards = shuffle(answerWords.concat(extras));

                setPool(allCards);
                setSelected([]);
                setFeedback(null);
                setIsCorrect(false);
            };

            useEffect(function () {
                generateSentence();
            }, []);

            var checkAnswer = function () {
                var userAnswer = selected.join(' ');
                var s = sentences.find(function (item) {
                    if (missionLang === 'en') return item.en.join(' ') === mission;
                    return item.es.join(' ') === mission;
                });
                if (!s) { generateSentence(); return; }

                var correctAnswer = missionLang === 'en' ? s.es.join(' ') : s.en.join(' ');
                var answerLang = missionLang === 'en' ? 'es-MX' : 'en-US';

                playAudio(userAnswer, answerLang);
                if (userAnswer === correctAnswer) {
                    setFeedback('correct');
                    setIsCorrect(true);
                    setScore(function (prev) { return prev + 1; });
                    playAudio('Correct!', 'en-US');
                } else {
                    setFeedback('incorrect');
                    setTimeout(function () {
                        playAudio('Try again', 'en-US');
                        setFeedback(null);
                    }, 1500);
                }
            };

            return (
                <div className="max-w-2xl mx-auto animate-fade-in text-center">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className={`text-3xl font-black text-white`}>Lego Frases</h2>
                        <span className="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 px-5 py-2 rounded-full font-black text-sm shadow-xl">SCORE: {score}</span>
                    </div>

                    <div className={`p-10 rounded-[2.5rem] mb-10 shadow-2xl border transition-all duration-500 ${feedback === 'correct' ? 'border-emerald-500 bg-emerald-900/30' : feedback === 'incorrect' ? 'border-rose-500 bg-rose-900/30' : 'border-indigo-500/20 ' + theme.cardBg}`}>
                        <p className="text-indigo-400 text-xs font-black uppercase tracking-widest mb-4">Traduce esta frase:</p>
                        <p className={`text-3xl font-black flex items-center justify-center gap-4 cursor-pointer ${missionLang === 'en' ? 'text-white hover:text-indigo-400' : 'text-emerald-400 hover:text-emerald-300'}`}
                            onClick={function () { playAudio(mission, missionLang === 'en' ? 'en-US' : 'es-MX'); }}>
                            {mission}
                            <Icon name="volume-2" size={24} className={missionLang === 'en' ? 'text-indigo-500' : 'text-emerald-500'} />
                        </p>
                        {feedback === 'correct' && <p className="mt-4 text-xl font-black text-emerald-400 animate-pop-in">✅ ¡Correcto!</p>}
                        {feedback === 'incorrect' && <p className="mt-4 text-xl font-black text-rose-400 animate-pop-in">❌ Incorrecto, intenta de nuevo</p>}
                    </div>

                    <div className={`min-h-[120px] border-2 border-dashed rounded-[2.5rem] p-6 mb-8 flex flex-wrap gap-3 justify-center items-center transition-all ${isDark ? 'bg-zinc-950/80 border-zinc-800 shadow-inner' : 'bg-slate-100 border-slate-300'}`}>
                        {selected.length === 0 && <p className="text-zinc-700 font-bold uppercase tracking-widest text-sm">Coloca las palabras traducidas aquí...</p>}
                        {selected.map(function (w, i) {
                            return <button key={'s' + i} onClick={function () { if (!isCorrect) setSelected(selected.filter(function (_, idx) { return idx !== i; })); }} className={`px-6 py-3 rounded-2xl font-black text-lg shadow-2xl animate-pop-in ${theme.btnAccent}`}>{w}</button>;
                        })}
                    </div>

                    <div className="flex flex-wrap gap-3 justify-center mb-8">
                        {pool.map(function (w, idx) {
                            var isUsed = selected.indexOf(w) !== -1;
                            return <button key={'p' + idx} disabled={isUsed || isCorrect} onClick={function () {
                                setSelected(selected.concat([w]));
                                playAudio(w, missionLang === 'en' ? 'es-MX' : 'en-US');
                            }} className={`px-5 py-3 rounded-2xl border-2 font-bold shadow-xl transition-all transform hover:scale-105 active:scale-95 ${isUsed ? 'opacity-30 cursor-not-allowed' : ''} ${theme.cardBg} border-zinc-800 ${theme.cardHover} text-white`}>{w}</button>;
                        })}
                    </div>

                    <div className="flex flex-col gap-4">
                        {!isCorrect ? (
                            <button onClick={checkAnswer} disabled={selected.length === 0}
                                className={`flex items-center justify-center gap-2 mx-auto font-black px-10 py-4 rounded-full transition-all ${theme.btnPrimary} disabled:opacity-20`}>
                                <Icon name="check-circle-2" size={20} /> Comprobar
                            </button>
                        ) : (
                            <button onClick={generateSentence}
                                className={`flex items-center justify-center gap-2 mx-auto font-black px-10 py-4 rounded-full transition-all bg-emerald-600 hover:bg-emerald-500 text-white animate-pop-in`}>
                                Siguiente Frase <Icon name="arrow-right" size={20} />
                            </button>
                        )}
                        <div className="flex justify-center gap-6 mt-2">
                            <button onClick={function () { if (!isCorrect) { setSelected([]); setFeedback(null); } }} className="text-rose-500 font-black uppercase tracking-widest text-xs hover:text-rose-400">Limpiar</button>
                            <button onClick={generateSentence} className="text-indigo-500 font-black uppercase tracking-widest text-xs hover:text-indigo-400">Saltar</button>
                        </div>
                    </div>
                </div>
            );
        }

        function ChatModule({ db, playAudio, theme, isDark }) {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I am your AI English teacher. Type any word or phrase you know. (You can also chat offline without an API Key)', translation: '¡Hola! Soy tu profesor de inglés con Inteligencia Artificial. Escribe cualquier frase. (Puedes chatear sin conexión también)' }
            ]);
            const [input, setInput] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [isLoading, setIsLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isLoading]);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('gemini_key', key);
            };

            const sendMessage = async () => {
                if (!input.trim() || isLoading) return;
                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);

                if (!apiKey) {
                    setTimeout(() => {
                        const replies = [
                            { content: "Very good! Do you know more words?", translation: "¡Muy bien! ¿Sabes más palabras?" },
                            { content: "Excellent! Let's keep practicing.", translation: "¡Excelente! Sigamos practicando." },
                            { content: "That is correct! What else can you say?", translation: "¡Eso es correcto! ¿Qué más puedes decir?" },
                            { content: "Oh wow, great job! You are very smart.", translation: "¡Oh wow, gran trabajo! Eres muy inteligente." }
                        ];
                        const reply = replies[Math.floor(Math.random() * replies.length)];
                        setMessages(prev => [...prev, { role: 'assistant', content: reply.content, translation: reply.translation }]);
                        playAudio(reply.content, 'en-US');
                    }, 800);
                    return;
                }

                setIsLoading(true);
                try {
                    const prompt = `Eres un profesor amable de inglés para principiantes. Responde amigablemente al siguiente mensaje del usuario en inglés (muy corto, básico). Tu respuesta debe ser UNICAMENTE un objeto JSON en este formato estricto: {"en": "tu respuesta en inglés", "es": "tu respuesta traducida al español"}. No agregues markdown ni nada fuera del JSON. El usuario dice: "${userMsg}"`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);

                    const textResponse = data.candidates[0].content.parts[0].text;
                    const cleanJson = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsed = JSON.parse(cleanJson);

                    setMessages(prev => [...prev, { role: 'assistant', content: parsed.en, translation: parsed.es }]);
                    playAudio(parsed.en, 'en-US');
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "Sorry, I had a connection or API Key problem.", translation: `Error de IA: Verifique su llave API (${error.message})` }]);
                }
                setIsLoading(false);
            };

            return (
                <div className="max-w-2xl mx-auto h-[75vh] flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className={`text-3xl font-black text-white`}>Chat con IA 🤖</h2>
                        <input
                            type="password"
                            value={apiKey}
                            onChange={(e) => saveApiKey(e.target.value)}
                            placeholder="Tu Gemini API Key (Opcional)"
                            className={`p-2 rounded-xl border border-zinc-800 text-xs w-48 ${theme.inputBg}`}
                            title="Ingresa tu clave de Gemini API para activar la IA"
                        />
                    </div>
                    <div
                        ref={scrollRef}
                        className={`flex-1 overflow-y-auto p-8 rounded-[2.5rem] border-2 border-zinc-800 mb-6 space-y-6 shadow-inner scroll-smooth ${theme.cardBg}`}
                    >
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-5 rounded-3xl max-w-[85%] shadow-2xl text-base leading-relaxed ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-zinc-800 text-zinc-100 rounded-tl-none border border-zinc-700'}`}>
                                    <p className="whitespace-pre-wrap">{m.content}</p>
                                    {m.role === 'assistant' && (
                                        <div className="flex flex-col gap-2 mt-4 pt-3 border-t border-zinc-700/50">
                                            <p className="text-zinc-400 italic text-sm">{m.translation}</p>
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={() => playAudio(m.content, 'en-US')} className="text-[10px] font-black uppercase tracking-widest text-indigo-400 flex items-center gap-1 hover:text-indigo-300 bg-indigo-900/40 p-2 rounded-lg">
                                                    <Icon name="volume-2" size={12} /> INGLÉS
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="p-5 rounded-3xl bg-zinc-800 text-zinc-100 rounded-tl-none shadow-2xl animate-pulse">
                                    <p>Pensando...</p>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="flex gap-4">
                        <input
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
                            className={`flex-1 p-5 rounded-2xl border-2 border-zinc-800 focus:border-indigo-500 outline-none transition-all font-medium ${theme.inputBg}`}
                            placeholder="Habla conmigo..."
                            disabled={isLoading}
                        />
                        <button onClick={sendMessage} disabled={isLoading} className={`p-5 rounded-2xl transition-all shadow-2xl ${isLoading ? 'opacity-50' : ''} ${theme.btnPrimary}`}>
                            <Icon name="send" size={24} />
                        </button>
                    </div>
                </div>
            );
        }

        function DatabaseManager({ db, setDb, theme, showToast, recordings, playRecording, recordingState, startRecording, stopRecording }) {
            const [newWord, setNewWord] = useState({ en: '', es: '', pron: '', emoji: '', category: 'Varios' });

            const handleAdd = () => {
                if (!newWord.en || !newWord.es) return;
                setDb(prev => [{ ...newWord, id: Date.now() }, ...prev]);
                showToast(`¡Añadida la palabra ${newWord.en}!`);
                setNewWord({ en: '', es: '', pron: '', emoji: '', category: 'Varios' });
            };

            return (
                <div className="max-w-4xl mx-auto pb-20">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className={`text-3xl font-black text-white`}>Gestión de Recursos 🛠️</h2>
                    </div>

                    <div className={`p-6 mb-8 rounded-3xl border border-zinc-800 ${theme.cardBg}`}>
                        <h3 className="text-indigo-400 font-black uppercase text-xs tracking-widest mb-4">Añadir Palabra</h3>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                            <input value={newWord.en} onChange={e => setNewWord({ ...newWord, en: e.target.value })} placeholder="Inglés" className={`p-3 rounded-xl border border-zinc-800 text-sm outline-none ${theme.inputBg}`} />
                            <input value={newWord.es} onChange={e => setNewWord({ ...newWord, es: e.target.value })} placeholder="Español" className={`p-3 rounded-xl border border-zinc-800 text-sm outline-none ${theme.inputBg}`} />
                            <input value={newWord.pron} onChange={e => setNewWord({ ...newWord, pron: e.target.value })} placeholder="Pronun." className={`p-3 rounded-xl border border-zinc-800 text-sm outline-none ${theme.inputBg}`} />
                            <input value={newWord.emoji} onChange={e => setNewWord({ ...newWord, emoji: e.target.value })} placeholder="Emoji" className={`p-3 rounded-xl border border-zinc-800 text-sm outline-none ${theme.inputBg}`} />
                            <button onClick={handleAdd} className={`px-5 py-3 rounded-xl font-bold flex items-center justify-center gap-2 ${theme.btnPrimary}`}>
                                <Icon name="plus-circle" size={18} /> Añadir
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div>
                            <h3 className="text-emerald-500 font-black uppercase text-xs tracking-widest mb-6 border-l-4 border-emerald-500 pl-3">Vocabulario</h3>
                            <div className={`rounded-3xl border overflow-hidden shadow-2xl transition-all ${theme.cardBg} border-zinc-800`}>
                                <div className="h-[600px] overflow-y-auto">
                                    <table className="w-full text-left relative">
                                        <thead className="bg-zinc-950 sticky top-0 z-10">
                                            <tr>
                                                <th className="p-4 font-black text-indigo-400 uppercase text-[10px]">Palabra</th>
                                                <th className="p-4 font-black text-emerald-500 uppercase text-[10px]">Español</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {db.map(w => (
                                                <tr key={w.id} className="border-t border-zinc-800/50 hover:bg-white/5 group">
                                                    <td className="p-4 flex items-center gap-3 text-sm font-bold text-white">
                                                        <span className="text-xl">{w.emoji}</span>
                                                        <div className="flex flex-col"><span className="text-white">{w.en}</span><span className="text-[9px] text-zinc-500 uppercase tracking-widest">{w.category}</span></div>
                                                    </td>
                                                    <td className="p-4 text-xs text-zinc-400">{w.es}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 className="text-amber-500 font-black uppercase text-xs tracking-widest mb-6 border-l-4 border-amber-500 pl-3">Banco de Sonidos (Phonetics)</h3>
                            <div className={`rounded-3xl border overflow-hidden shadow-2xl transition-all ${theme.cardBg} border-zinc-800 p-4`}>
                                <div className="h-[600px] overflow-y-auto space-y-4 pr-2">
                                    {[...phoneticData.alphabet, ...phoneticData.shortVowels, ...phoneticData.longVowels, ...phoneticData.trickySounds].map((item, i) => {
                                        const label = item.L || item.letter;
                                        const idPrefix = phoneticData.alphabet.includes(item) ? 'abc' : phoneticData.shortVowels.includes(item) ? 'short' : phoneticData.longVowels.includes(item) ? 'long' : 'tricky';
                                        const cardId = `${idPrefix}-${label}`;
                                        return (
                                            <div key={i} className="bg-zinc-950/50 p-4 rounded-2xl flex items-center justify-between border border-zinc-800 group hover:border-amber-500/30 transition-all">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-2xl font-black text-white w-8">{label}</span>
                                                    <div>
                                                        <p className="text-amber-500 font-mono text-xs">{item.s}</p>
                                                        <p className="text-[10px] text-zinc-600 italic">{item.desc.substring(0, 30)}...</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button
                                                        onClick={() => playAudio(item.sound, 'en-US')}
                                                        title="Escuchar ejemplo nativo"
                                                        className="p-2 rounded-lg bg-indigo-900/30 text-indigo-400 hover:bg-indigo-600 hover:text-white transition-all shadow-inner border border-indigo-500/20">
                                                        <Icon name="headphones" size={14} />
                                                    </button>
                                                    <button onClick={() => recordingState === cardId ? stopRecording() : startRecording(cardId)}
                                                        className={`p-2 rounded-lg transition-all ${recordingState === cardId ? 'bg-rose-600 text-white animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.4)]' : 'bg-zinc-800 text-zinc-400 hover:text-rose-500 border border-zinc-700'}`}>
                                                        <Icon name={recordingState === cardId ? 'square' : 'mic'} size={14} />
                                                    </button>
                                                    <button onClick={() => playRecording(cardId)} disabled={!recordings[cardId]}
                                                        className={`p-2 rounded-lg transition-all ${recordings[cardId] ? 'bg-amber-600 text-white shadow-lg shadow-amber-500/30' : 'bg-zinc-800 text-zinc-400 opacity-20 border border-zinc-700'}`}>
                                                        <Icon name="play" size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
